name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect:
    name: Detect affected workspaces
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
            HEAD_REF="${{ github.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.sha }}"
          fi

          apps=$(BASE_REF="$BASE_REF" HEAD_REF="$HEAD_REF" node scripts/ci/affected-workspaces.mjs)
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

          if [ "$apps" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test changed apps
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm run test --workspace @microfrontend/${{ matrix.app }} --if-present

  deploy:
    name: Deploy changed apps to CloudFront
    needs: [detect, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest


    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      VITE_HEADER_REMOTE_URL: ${{ vars.VITE_HEADER_REMOTE_URL }}
      VITE_FOOTER_REMOTE_URL: ${{ vars.VITE_FOOTER_REMOTE_URL }}
      VITE_PRODUCTS_REMOTE_URL: ${{ vars.VITE_PRODUCTS_REMOTE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build app
        run: npm run build --workspace @microfrontend/${{ matrix.app }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3 and invalidate CloudFront
        shell: bash
        run: |
          case "${{ matrix.app }}" in
            header)
              DIST_DIR="dist/header"
              BUCKET="${{ secrets.AWS_S3_BUCKET_HEADER }}"
              DISTRIBUTION_ID="${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_HEADER }}"
              ;;
            footer)
              DIST_DIR="dist/footer"
              BUCKET="${{ secrets.AWS_S3_BUCKET_FOOTER }}"
              DISTRIBUTION_ID="${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_FOOTER }}"
              ;;
            products)
              DIST_DIR="dist/products"
              BUCKET="${{ secrets.AWS_S3_BUCKET_PRODUCTS }}"
              DISTRIBUTION_ID="${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_PRODUCTS }}"
              ;;
            host)
              DIST_DIR="dist/host"
              BUCKET="${{ secrets.AWS_S3_BUCKET_HOST }}"
              DISTRIBUTION_ID="${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_HOST }}"
              ;;
          esac

          aws s3 sync "$DIST_DIR" "s3://$BUCKET" --delete
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
